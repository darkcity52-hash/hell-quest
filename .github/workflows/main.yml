name: Build APK Final 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev libncurses5-dev libffi-dev libssl-dev ccache cmake libtool pkg-config autoconf automake libltdl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Limpiar Cache y Compilar APK
        run: |
          # 1. Asegurar que las licencias se acepten automáticamente
          export APP_ANDROID_ACCEPT_SDK_LICENSE=True
          
          # 2. Limpiar compilaciones previas con error (Crucial para corregir LT_SYS_SYMBOL_USCORE)
          ~/.local/bin/buildozer android clean
          
          # 3. Compilar en modo debug
          ~/.local/bin/buildozer android debug

      - name: Subir APK resultante
        uses: actions/upload-artifact@v4
        with:
          name: CodeQuest-Debug
          path: bin/*.apk
