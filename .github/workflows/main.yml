name: Build CodeQuest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade Cython virtualenv buildozer
      - name: Install System Dependencies
        run: |
          sudo apt update
          # Instalamos libtool, m4 y automake explícitamente para evitar el error LT_SYS_SYMBOL_USCORE
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake m4 libltdl-dev
          pip3 install --user --upgrade Cython virtualenv buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Limpiar carpetas temporales para evitar choques
          rm -rf .buildozer/android/platform/build-*
          
          # Compilar con log detallado
          buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeQuest-APK
          path: bin/*.apk
          
