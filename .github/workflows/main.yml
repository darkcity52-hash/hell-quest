name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Cache Buildozer
        uses: actions/cache@v2
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-dev libncurses5-dev libffi-dev libssl-dev ccache cmake expect
          pip3 install --user --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Accept Licenses and Build
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # Este comando acepta todas las licencias de Android
          yes | buildozer android debug
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: CodeQuest-APK
          path: bin/*.apk
