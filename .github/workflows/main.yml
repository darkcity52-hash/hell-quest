name: Build APK Final 2026

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Cache de Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Instalar Dependencias del Sistema
      run: |
        sudo apt update
        sudo apt install -y python3-pip build-essential git python3-dev libncurses5-dev libffi-dev libssl-dev ccache cmake expect automake autoconf libtool
        pip3 install --user --upgrade Cython==0.29.33 buildozer virtualenv

    - name: Aceptar Licencias y Compilar
      run: |
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        export APP_ANDROID_ACCEPT_SDK_LICENSE=True
        buildozer android debug || (sleep 5 && buildozer android debug)
