name: Build CodeQuest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake m4 libltdl-dev wget curl libsqlite3-dev gperf
          # Forzamos Cython 0.29.33 que es la más estable para Kivy/Android
          pip3 install --user --upgrade "Cython<3.0" virtualenv "buildozer>=1.5.0"


      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Limpiamos rastros viejos para que la descarga sea nueva
          rm -rf .buildozer/android/platform/android-sdk
          rm -rf .buildozer/android/platform/android-ndk-r25b
          
          # Ejecutamos la compilación
          buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeQuest-APK
          path: bin/*.apk
